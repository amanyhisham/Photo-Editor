<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Photo Editor</title>
</head>
<body>
<div class="container">
    <!--class Imgage-->
    <div class="img"  >
        <img id="img" >
        <canvas></canvas>
        <div class="upload">
            <label for="upload">Upload </label>
            <input type="file" id="upload" >
        </div>
    </div>
    <!--class  Filters-->
    <div class=" filter">
        <ul>
            <li>
                <label for="Saturate">Saturate</label>
                <input type="range" id="Saturate" min="0" max="200" value="100">
            </li>
            <li>
                <label for="Contrast">Contrast</label>
                <input type="range" id="Contrast" min="0" max="200" value="100">
            </li>
            <li>
                <label for="Brightness">Brightness</label>
                <input type="range" id="Brightness" min="0" max="200" value="100">  
            </li>
            <li>
                <label for="Sepia">Sepia</label>
                <input type="range" id="Sepia" min="0" max="200" value="0"> 
            </li>
            <li>
                <label for="Grayscale">Grayscale</label>
                <input type="range" id="Grayscale" min="0" max="1" step="0.1" value="0"> 
            </li>
            <li>
                <label for="Blur">Blur</label>
                <input type="range" id="Blur" min="0" max="10" value="0" step="0.1">   
            </li>
            <li>
                <label for="HueRotate">HueRotate</label>
                <input type="range" id="HueRotate" min="0" max="360" value="0">
            </li>
            <li>
                <a id="download" download="true">Download</a>
                <span onclick=" resetValues()">Reset</span>
            </li>
        </ul>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
